##
## CUSTOMIZATION CHECKLIST
##

customization_checklist:
  replace_these_placeholders:
    - "{{OFFER_NAME}}: Your program or product name"
    - "{{OFFER_PRICE}}: Investment amount (e.g., '$3,500')"
    - "{{DOMAIN}}: The field being sold into (e.g., 'DevOps', 'copywriting')"
    - "{{OUTCOME}}: What the buyer achieves (specific and concrete)"
    - "{{OUTCOME_METRIC}}: The measurable result (salary, revenue, close rate)"
    - "{{TIMELINE}}: Realistic time to outcome (e.g., '6-12 months')"
    - "{{OFFER_COMPONENTS}}: Your 4-6 core deliverables in Phase 11"
    - "{{ORIGIN_STORY}}: Best student success story (name, starting point, result, timeframe)"

  do_not_change:
    - "Universal principles (Part 1) — these apply across all offers"
    - "Objection handler scripts (Part 3) — objections don't change by offer"
    - "Follow-up protocol (Part 4) — leadership model is universal"
    - "Archetype system — the 5 types appear in every high-ticket context"
    - "Tie-down system — Five C's are universal"

  validate_before_going_live:
    - "Phase 4 baseline questions are domain-specific"
    - "Phase 5 goal questions reference your {{OUTCOME_METRIC}}"
    - "Phase 11 pitch components match your actual deliverables"
    - "Close scripts reference your {{OFFER_PRICE}} and {{OUTCOME}}"
    - "{{ORIGIN_STORY}} is specific: name, starting point, result, timeframe"
    - "You know the objection handlers well enough to deliver them in YOUR voice"

  empirical_baselines_from_kubecraft:
    note: "Use these as benchmarks when applying to a new offer. Adjust as you collect data."
    close_rate_by_archetype:
      pain_buyer: "~49% (36/74)"
      vision_buyer: "~50% (17/34)"
      crisis_buyer: "~50% (2/4 — small sample)"
      unclear: "0% (20/20) — if you can't detect archetype, DQ or BAMFAM"
    top_close_triggers:
      - "Prospect uses 'when I start' / 'when I join' language"
      - "Asks about payment options unprompted"
      - "Rates program fit 8-10 unprompted"
      - "Asks follow-up questions about curriculum/logistics"
    top_loss_causes:
      - "~80% financial — cannot afford under any payment structure"
      - "~15% wrong fit — goals misaligned"
      - "~5% logistics/trust breakdown"
