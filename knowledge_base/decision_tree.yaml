##
## REAL-TIME AI COACHING SIGNALS
## Maps what the coaching system should listen for → recommended move
##

ai_realtime_signals:
  early_archetype_detection:
    - signal: "Prospect mentions layoff or months unemployed"
      action: "Flag PAIN_BUYER. Surface: 'How long has this been going on?'"

    - signal: "Prospect says they're currently employed and want to grow"
      action: "Flag VISION_BUYER. Surface: 'What's prompting the change NOW specifically?'"

    - signal: "Prospect asks about payment plans in first 3 minutes"
      action: "Flag CRISIS_BUYER. Qualify finances in Phase 3 before going deeper."

    - signal: "Prospect gives vague answer to 'why did you book today'"
      action: "Flag TIRE_KICKER tentative. Ask urgency 1-10 scale immediately."

  close_readiness_signals:
    - signal: "Prospect uses 'when I start' or 'when I join'"
      action: "Move to close immediately. Don't delay."

    - signal: "Prospect asks 'what happens next' or 'how do I get started'"
      action: "Close trigger. Transition to price reveal."

    - signal: "Prospect rates program fit 8+ unprompted"
      action: "Close trigger. Don't keep pitching."

    - signal: "Prospect asks detailed follow-up questions about curriculum"
      action: "Buying interest signal. Move to temp check."

  danger_signals:
    - signal: "Prospect says 'let me think about it' at close"
      action: "Use tie-down: 'You said this was a NOW thing. What changed?'"

    - signal: "Spouse mentioned for first time at price reveal"
      action: "Missed it in Phase 6. Offer 3-minute spouse call right now."

    - signal: "Prospect silent after price reveal for more than 8 seconds"
      action: "Let them think. Don't fill the silence."

    - signal: "Prospect mentions financial hardship at close"
      action: "Move to payment plan immediately. Don't defend the price."

  disqualify_signals:
    - signal: "Urgency scale 1-4 with no clear reason to change"
      action: "DQ or BAMFAM. Do not pitch."

    - signal: "Goals clearly misaligned with KubeCraft offering"
      action: "DQ early. Better a short call than a refund request."

    - signal: "Cannot meet minimum payment under any structure"
      action: "Ethical DQ. Free community referral."
