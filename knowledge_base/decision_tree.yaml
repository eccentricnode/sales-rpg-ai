##
## TOP DISCOVERY QUESTIONS FROM CLOSES
## Ranked by frequency across 55 confirmed closes
##

top_discovery_questions:
  tier_1_universal_openers:
    - question: "What's the main thing that motivated you to book this call today?"
      appears_in: "Nearly all closes — universal opener"
      purpose: "Initial framing. Archetype detection. Sets tone."
      when: "Phase 2 — first 2-3 minutes"

    - question: "can you kind of just walk me through why you decided to book the call with us today?"
      appears_in: "Multiple closes (Derrick Gill, Jeroen Hammega)"
      purpose: "Same as above — conversational variant"
      when: "Phase 2"

  tier_2_high_frequency:
    - question: "What challenges are you facing in your current role?"
      frequency: 3
      archetypes: ["pain_buyer"]
      when: "Phase 3 — pain excavation"

    - question: "What is your end goal for the next 6 to 12 months?"
      frequency: 2
      archetypes: ["vision_buyer", "pain_buyer"]
      when: "Phase 5 — goals"

    - question: "What are your salary expectations?"
      frequency: 2
      archetypes: ["pain_buyer"]
      when: "Phase 5 — goals. Critical for close ROI math."

    - question: "What challenges are you facing in your job search?"
      frequency: 2
      archetypes: ["pain_buyer", "crisis_buyer"]
      when: "Phase 3"

    - question: "What are your current career goals?"
      frequency: 2
      archetypes: ["pain_buyer"]
      when: "Phase 3-5"

  tier_3_effective_situational:
    - question: "How would you rate your Linux/Docker/Kubernetes familiarity on a scale of 1 to 10?"
      appears_in: "Most closes"
      when: "Phase 4 — technical baseline"

    - question: "What's holding you back from doing this on your own?"
      appears_in: "Blocker surfacing — high value"
      when: "Phase 6"

    - question: "Is this a NOW thing for you?"
      appears_in: "Tie-down"
      when: "Phase 7"

    - question: "What motivates you to transition to DevOps specifically?"
      appears_in: "2 closes"
      when: "Phase 3 — confirm domain commitment"

    - question: "Is there a reason for this shift? What's prompting this?"
      appears_in: "2 closes (Scott Medway, others)"
      when: "Phase 3 — especially for vision buyers"

    - question: "What are your immediate goals for the next three to six months?"
      appears_in: "2 closes"
      archetypes: ["pain_buyer"]
      when: "Phase 5 — urgency variant"

  questions_to_avoid_in_closes:
    - question: "Where do you see yourself in 5 years?"
      reason: "Too abstract for pain buyers. Vision buyers answer vaguely. Use 6-12 month instead."
    - question: "What did you think of the program?"
      reason: "Too passive. Use temp check scale (1-10) instead."
    - question: "Does that make sense?"
      reason: "Invites 'yes' without commitment. Use temp check instead."

